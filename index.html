<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>AI Resume Screening</title>
    <style>
      #root:empty::after {
        content: "Loading AI Resume Screening...";
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        font-weight: 700;
        color: #94a3b8;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        background: #f8fafc;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Inline debug: catch ALL failures
      var root = document.getElementById('root');
      function showError(title, detail) {
        root.innerHTML = '<div style="padding:40px;font-family:sans-serif;margin:20px;border-radius:16px;border:2px solid #dc3545;background:#fff5f5;"><h2 style="color:#dc3545;margin:0 0 12px 0;">' + title + '</h2><pre style="white-space:pre-wrap;word-break:break-all;font-size:12px;color:#666;">' + detail + '</pre></div>';
      }
      window.onerror = function(msg, src, line, col, err) {
        showError('JS Runtime Error', (err ? err.stack || err.message : msg) + '\n\nSource: ' + (src || '?') + ':' + (line || '?'));
      };
      window.addEventListener('error', function(evt) {
        if (evt.target && (evt.target.tagName === 'SCRIPT' || evt.target.tagName === 'LINK')) {
          showError('Asset Load Failed', 'Could not load: ' + (evt.target.src || evt.target.href || 'unknown'));
        }
      }, true);
      console.log('[ST] HTML loaded, waiting for JS bundle...');
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
